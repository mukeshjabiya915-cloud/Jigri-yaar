<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Rummy - SuperAce Style</title>
    <style>
        body { background-color: #052c16; color: white; text-align: center; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; }
        
        /* Multiplier Bar */
        .multiplier-bar {
            display: flex; justify-content: center; gap: 10px; background: #000; padding: 10px; margin-bottom: 20px;
            border-bottom: 3px solid #ffd700;
        }
        .m-item { padding: 5px 15px; border-radius: 5px; background: #333; font-size: 18px; color: #777; }
        .m-active { background: #ffd700; color: #000; box-shadow: 0 0 10px #ffd700; }

        .game-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            padding: 10px; max-width: 360px; margin: 0 auto;
        }

        .slot { width: 75px; height: 105px; border-radius: 5px; position: relative; background: rgba(255,255,255,0.05); }

        /* Card Animation */
        @keyframes cardFall { 0% { transform: translateY(-300px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes blast { 0% { transform: scale(1); } 50% { transform: scale(1.2); filter: brightness(2); } 100% { transform: scale(0); } }

        .card { 
            width: 70px; height: 100px; background: white; color: black; border-radius: 5px; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
            font-weight: bold; border: 2px solid #333; position: absolute; top: 0; left: 0;
            animation: cardFall 0.3s ease-out forwards;
        }
        
        .golden { border: 3px solid #ffd700; background: linear-gradient(135deg, #fff 0%, #ffd700 100%); }
        .wild { background: linear-gradient(to bottom, #ff0000, #ffcc00); color: white; border: 2px solid #fff; }
        .scatter { background: radial-gradient(circle, #fff, #ff8c00); border: 2px solid #ffd700; box-shadow: 0 0 15px #ffd700; }
        
        .blasting { animation: blast 0.4s forwards; }

        .controls { margin-top: 30px; }
        button { 
            padding: 15px 50px; font-size: 22px; background: linear-gradient(#ffd700, #ff8c00); 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #1a472a; 
            box-shadow: 0 6px #b8860b;
        }
    </style>
</head>
<body>

    <div class="multiplier-bar">
        <div id="m1" class="m-item m-active">x1</div>
        <div id="m2" class="m-item">x2</div>
        <div id="m3" class="m-item">x3</div>
        <div id="m5" class="m-item">x5</div>
    </div>

    <div class="game-grid" id="main-grid"></div>

    <div class="controls">
        <button id="spin-btn" onclick="startGame()">PLAY</button>
    </div>

    <script>
        const grid = document.getElementById('main-grid');
        const values = ['A', 'K', 'Q', 'J', '10', '9'];
        const suits = ['♠', '♥', '♣', '♦'];
        
        // स्लॉट्स बनाएं
        for(let i=0; i<20; i++) {
            let div = document.createElement('div');
            div.className = 'slot';
            div.id = 'slot-'+i;
            grid.appendChild(div);
        }

        function startGame() {
            document.getElementById('spin-btn').disabled = true;
            fillGrid();
        }

        function fillGrid() {
            for(let i=0; i<20; i++) {
                setTimeout(() => createCard(i), i * 30);
            }
            setTimeout(checkWins, 1000);
        }

        function createCard(id, forceWild = false) {
            const slot = document.getElementById('slot-'+id);
            slot.innerHTML = '';
            const card = document.createElement('div');
            
            let rand = Math.random();
            if(forceWild) {
                card.className = 'card wild';
                card.innerHTML = 'WILD';
            } else if(rand < 0.02) { // 2% Scatter
                card.className = 'card scatter';
                card.innerHTML = 'S';
            } else if(rand < 0.15) { // 15% Golden
                card.className = 'card golden';
                let val = values[Math.floor(Math.random()*values.length)];
                card.innerHTML = val;
            } else {
                card.className = 'card';
                let val = values[Math.floor(Math.random()*values.length)];
                card.innerHTML = val;
            }
            slot.appendChild(card);
        }

        function checkWins() {
            // यहाँ जीतने का लॉजिक और 'A' के फूटने का लॉजिक आएगा
            let slots = document.querySelectorAll('.card');
            let hasWin = false;

            slots.forEach((card, index) => {
                if(card.innerHTML === 'A' || card.classList.contains('golden')) {
                    hasWin = true;
                    card.classList.add('blasting');
                    setTimeout(() => {
                        // अगर Golden था तो WILD बनाओ, वरना नया गिराओ
                        createCard(index, card.classList.contains('golden'));
                    }, 400);
                }
            });

            if(hasWin) {
                setTimeout(checkWins, 800); // अगर जीता तो फिर से चेक करो (Combo)
            } else {
                document.getElementById('spin-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
