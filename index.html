<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Rummy - 7 Lines & Free Spins</title>
    <style>
        body { background-color: #1a472a; color: white; text-align: center; font-family: Arial, sans-serif; margin: 0; overflow-x: hidden; }
        .game-title { margin-top: 20px; font-size: 26px; color: #ffd700; font-weight: bold; text-shadow: 2px 2px #000; }
        
        .status-box { background: rgba(0,0,0,0.5); padding: 10px; margin: 10px auto; width: 200px; border-radius: 10px; border: 1px solid #ffd700; }
        .free-spins { color: #00ff00; font-weight: bold; font-size: 20px; }

        .slots-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 50px; padding: 10px; }
        .slot { width: 50px; height: 75px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; position: relative; background: rgba(0,0,0,0.1); }

        @keyframes fallToSlot { 0% { transform: translateY(-400px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes scatterEffect { 0% { transform: scale(1); } 50% { transform: scale(1.2); background: #ffd700; } 100% { transform: scale(1); } }

        .card { width: 45px; height: 65px; background: white; color: black; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; border: 1.5px solid #000; position: absolute; top: 4px; left: 1px; animation: fallToSlot 0.3s ease-out forwards; }
        .scatter { background: #ffd700; color: #000; border: 2px solid #fff; animation: fallToSlot 0.3s ease-out forwards, scatterEffect 1s infinite; }
        .red { color: red; }

        .controls { margin-top: 30px; }
        button { padding: 15px 40px; font-size: 18px; background: linear-gradient(#ffd700, #ff8c00); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; color: #1a472a; box-shadow: 0 5px #b8860b; }
        button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
